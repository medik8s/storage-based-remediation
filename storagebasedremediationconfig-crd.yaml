  names:
    kind: StorageBasedRemediationConfig
    listKind: StorageBasedRemediationConfigList
    plural: storagebasedremediationconfigs
    singular: storagebasedremediationconfig
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        description: StorageBasedRemediationConfig defines cluster-wide parameters for the Storage-Based Remediation (SBR) fencing mechanism.
        type: object
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation of an object. Servers should convert recognized schemas to the latest internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            description: StorageBasedRemediationConfigSpec defines the desired state of StorageBasedRemediationConfig
            type: object
            required:
            - sbrDevicePVCName
            - sbrTimeoutSeconds
            - watchdogPath
            properties:
              sbrDevicePVCName:
                description: The name of the PVC providing the shared block device
                type: string
                minLength: 1
                pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
              sbrTimeoutSeconds:
                description: The SBR timeout in seconds
                type: integer
                minimum: 1
                maximum: 3600
              watchdogPath:
                description: The path to the local kernel watchdog device (e.g., /dev/watchdog)
                type: string
                minLength: 1
                pattern: '^/dev/.*$'
              nodeExclusionList:
                description: A list of node names to exclude from SBR management
                type: array
                items:
                  type: string
                  minLength: 1
                  pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$'
              rebootMethod:
                description: The method to use for self-fencing
                type: string
                enum:
                - panic
                - systemctl-reboot
                default: panic
          status:
            description: StorageBasedRemediationConfigStatus defines the observed state of StorageBasedRemediationConfig
            type: object
            properties:
              conditions:
                description: Conditions represent the latest available observations of the StorageBasedRemediationConfig state
                type: array
                items:
                  description: "Condition contains details for one aspect of the current state of this API Resource. --- This struct is intended for direct use as an array at the field path .status.conditions.  For example, type FooStatus struct{ // Represents the observations of a foo's current state. // Known .status.conditions.type are: \"Available\", \"Progressing\", and \"Degraded\" // +patchMergeKey=type // +patchStrategy=merge // +listType=map // +listMapKey=type Conditions []metav1.Condition `json:\"conditions,omitempty\" patchStrategy:\"merge\" patchMergeKey:\"type\" protobuf:\"bytes,1,rep,name=conditions\"` // other fields }"
                  type: object
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  properties:
                    lastTransitionTime:
                      description: lastTransitionTime is the last time the condition transitioned from one status to another. This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      type: string
                      format: date-time
                    message:
                      description: message is a human readable message indicating details about the transition. This may be an empty string.
                      type: string
                      maxLength: 32768
                    observedGeneration:
                      description: observedGeneration represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date with respect to the current state of the instance.
                      type: integer
                      format: int64
                      minimum: 0
                    reason:
                      description: reason contains a programmatic identifier indicating the reason for the condition's last transition. Producers of specific condition types may define expected values and meanings for this field, and whether the values are considered a guaranteed API. The value should be a CamelCase string. This field may not be empty.
                      type: string
                      maxLength: 1024
                      minLength: 1
                      pattern: '^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$'
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      type: string
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase. --- Many .condition.type values are consistent across resources like Available, but because arbitrary conditions can be useful (see .node.status.conditions), the ability to deconflict is important. The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
                      type: string
                      maxLength: 316
                      pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$'
              phase:
                description: Phase represents the current phase of the StorageBasedRemediationConfig
                type: string
                enum:
                - Pending
                - Ready
                - Failed
    additionalPrinterColumns:
    - name: PVC Name
      type: string
      description: The name of the PVC providing the shared block device
      jsonPath: .spec.sbrDevicePVCName
    - name: Timeout
      type: integer
      description: The SBR timeout in seconds
      jsonPath: .spec.sbrTimeoutSeconds
    - name: Watchdog Path
      type: string
      description: The path to the local kernel watchdog device
      jsonPath: .spec.watchdogPath
    - name: Reboot Method
      type: string
      description: The method to use for self-fencing
      jsonPath: .spec.rebootMethod
    - name: Phase
      type: string
      description: The current phase of the StorageBasedRemediationConfig
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp 