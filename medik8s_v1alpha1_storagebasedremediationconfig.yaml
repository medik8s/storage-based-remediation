# StorageBasedRemediationConfig Sample Configuration
#
# This is a sample configuration for the SBR (Storage-Based Remediation) operator.
# The SBR operator provides watchdog-based fencing for Kubernetes clusters
# to ensure high availability through automatic node remediation.
#
# For comprehensive documentation, see: docs/sbr-config-user-guide.md

apiVersion: storage-based-remediation.medik8s.io/v1alpha1
kind: StorageBasedRemediationConfig
metadata:
  labels:
    app.kubernetes.io/name: sbr-operator
    app.kubernetes.io/managed-by: kustomize
  name: test-sbr-config
  namespace: sbr-test-e2e-1751869637547792000
spec:
  # ========================================================================
  # WATCHDOG CONFIGURATION
  # ========================================================================

  # Path to the watchdog device on cluster nodes
  # - Default: "/dev/watchdog"
  # - Common alternatives: "/dev/watchdog0", "/dev/watchdog1"
  # - If hardware watchdog is not available, softdog will be used automatically
  # - All nodes should have the same watchdog device path
  watchdogPath: "/dev/watchdog"

  # ========================================================================
  # SHARED STORAGE CONFIGURATION (OPTIONAL)
  # ========================================================================

  # Storage class name for creating shared storage for cross-node coordination
  # - When specified, the controller creates a PVC using this StorageClass
  # - The PVC is mounted in all SBR agent pods for coordination and slot assignment
  # - The StorageClass must support ReadWriteMany (RWX) access mode
  # - Common RWX storage classes: "efs-sc", "nfs-client", "cephfs", "glusterfs"
  #
  # Examples:
  # - AWS EFS: "efs-sc"
  # - NFS: "nfs-client"
  # - CephFS: "cephfs"
  # - GlusterFS: "glusterfs"
  #
  # Note: If not specified, SBR agents will operate independently without coordination
  # sharedStorageClass: sbr-efs-sc

  # ========================================================================
  # DEPLOYMENT CONFIGURATION
  # ========================================================================

  # Node selector for controlling which nodes the SBR Agent runs on
  # - Default: worker nodes only (node-role.kubernetes.io/worker: "")
  # - Automatically merged with Linux OS requirement (kubernetes.io/os: linux)
  # - Customize to target specific nodes by labels
  #
  # Examples:
  # - Default behavior (worker nodes only) - no configuration needed
  # - All nodes: nodeSelector: {}
  # - Specific zone: nodeSelector: {"topology.kubernetes.io/zone": "us-east-1a"}
  # - Custom labels: nodeSelector: {"sbr-enabled": "true", "tier": "compute"}
  #
  # Note: The controller automatically adds "kubernetes.io/os: linux" requirement
  # The SBR Agent DaemonSet will be deployed in the same namespace as this StorageBasedRemediationConfig resource
  # nodeSelector:
  #   node-role.kubernetes.io/worker: ""

# ========================================================================
# MULTIPLE StorageBasedRemediationConfig SUPPORT (NEW in v1.1+)
# ========================================================================
#
# The SBR operator now supports multiple StorageBasedRemediationConfig resources in the same namespace!
# This enables advanced deployment scenarios like A/B testing, gradual rollouts,
# and different configurations for different teams.
#
# KEY FEATURES:
# - Shared service account across all StorageBasedRemediationConfigs in a namespace
# - Separate DaemonSets with unique names for each StorageBasedRemediationConfig
# - Independent configurations (images, timeouts, node selectors, etc.)
# - Automatic cleanup when StorageBasedRemediationConfigs are deleted
#
# RESOURCE NAMING:
# - Service Account: sbr-agent (shared across all StorageBasedRemediationConfigs in namespace)
# - DaemonSet: sbr-agent-{storagebasedremediationconfig-name} (unique per StorageBasedRemediationConfig)
# - ClusterRoleBinding: sbr-agent-{namespace}-{storagebasedremediationconfig-name} (globally unique)
#
# EXAMPLE USAGE:
# kubectl apply -f production-sbr.yaml -f canary-sbr.yaml
# kubectl get storagebasedremediationconfig -n my-app
# kubectl get daemonset -n my-app -l app=sbr-agent
#
# ========================================================================
# CONFIGURATION EXAMPLES
# ========================================================================
#
# Basic Production Configuration (image auto-derived from operator):
# -------------------------------------------------------------------
# spec:
#   watchdogPath: "/dev/watchdog"
#
# Production Configuration:
# -------------------------
# spec:
#   watchdogPath: "/dev/watchdog"
#
# Multiple Configurations in Same Namespace:
# ------------------------------------------
# # Production config
# metadata:
#   name: production-sbr
#   namespace: my-app
# spec:
# ---
# # Canary config
# metadata:
#   name: canary-sbr
#   namespace: my-app
# spec:
#   nodeSelector:
#     canary: "true"
#
# High-Availability Configuration:
# --------------------------------
# spec:
#   watchdogPath: "/dev/watchdog1"
#
# Development/Testing Configuration:
# ----------------------------------
# spec:
#   watchdogPath: "/dev/watchdog"
#
# Note: Each StorageBasedRemediationConfig creates its own DaemonSet in the specified namespace.
# Multiple StorageBasedRemediationConfigs in the same namespace share the service account but
# have separate DaemonSets and configurations.
#
# ========================================================================
# DEPLOYMENT COMMANDS
# ========================================================================
#
# Apply configuration:
#   kubectl apply -f medik8s_v1alpha1_storagebasedremediationconfig.yaml
#
# Check status:
#   kubectl get storagebasedremediationconfig
#   kubectl describe storagebasedremediationconfig storagebasedremediationconfig-sample
#
# Monitor deployment:
#   kubectl get pods -n <namespace>
#   kubectl logs -n <namespace> -l app=sbr-agent
#   (Replace <namespace> with the namespace where you created the StorageBasedRemediationConfig)
#
# ========================================================================
# OPENSHIFT SECURITY CONTEXT CONSTRAINTS (SCC) MANAGEMENT
# ========================================================================
#
# The SBR operator automatically manages OpenShift SecurityContextConstraints
# when deployed on OpenShift clusters. The controller will:
#
# 1. Detect if running on OpenShift platform
# 2. Check for the required SCC: sbr-operator-sbr-agent-privileged
# 3. Automatically update the SCC to grant permissions to service accounts
#    in any namespace where StorageBasedRemediationConfig resources are deployed
#
# Example: If you create a StorageBasedRemediationConfig in namespace "my-app", the operator
# will automatically add "system:serviceaccount:my-app:sbr-agent" to the
# SCC users list, allowing pods to start with required privileges.
#
# Manual SCC management (if needed):
#   # Check SCC status
#   oc get scc sbr-operator-sbr-agent-privileged -o yaml
#
#   # Manually add service account (normally automatic)
#   oc adm policy add-scc-to-user sbr-operator-sbr-agent-privileged \
#     system:serviceaccount:my-namespace:sbr-agent
#
# Note: The base SCC must be installed via the OpenShift installer:
#   make build-openshift-installer
#   kubectl apply -f dist/install-openshift.yaml
#
# ========================================================================
