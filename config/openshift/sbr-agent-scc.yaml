# SecurityContextConstraints for SBR Agent
# This SCC allows the sbr-agent pods to run with the required privileges
# for accessing hardware watchdog devices and block devices
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: sbr-agent-privileged
  labels:
    app: sbr-agent
    app.kubernetes.io/name: sbr-operator
    app.kubernetes.io/component: sbr-agent
  annotations:
    kubernetes.io/description: "SecurityContextConstraints for SBR Agent pods that require privileged access to hardware watchdog and block devices"
allowHostDirVolumePlugin: true
allowHostIPC: false
allowHostNetwork: true
allowHostPID: true
allowHostPorts: false
allowPrivilegedContainer: true
allowedCapabilities:
- SYS_ADMIN
- SYS_MODULE
defaultAddCapabilities: null
fsGroup:
  type: RunAsAny
priority: 10
readOnlyRootFilesystem: false
requiredDropCapabilities: null
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
seccompProfiles:
- "*"
volumes:
- configMap
- downwardAPI
- emptyDir
- hostPath
- persistentVolumeClaim
- projected
- secret
users:
- system:serviceaccount:sbr-system:sbr-agent
groups: []

---
# ClusterRole to allow the sbr-agent service account to use the SCC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sbr-agent-scc-user
  labels:
    app: sbr-agent
    app.kubernetes.io/name: sbr-operator
    app.kubernetes.io/component: sbr-agent
rules:
- apiGroups:
  - security.openshift.io
  resources:
  - securitycontextconstraints
  resourceNames:
  - sbr-operator-sbr-agent-privileged
  verbs:
  - use

---
# ClusterRoleBinding to bind the sbr-agent service account to the SCC user role
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sbr-agent-scc-user
  labels:
    app: sbr-agent
    app.kubernetes.io/name: sbr-operator
    app.kubernetes.io/component: sbr-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sbr-agent-scc-user
subjects:
- kind: ServiceAccount
  name: sbr-agent
  namespace: sbr-system

---
# System ClusterRole that provides the same functionality as 'oc adm policy add-scc-to-user'
# This allows the sbr-agent service account to use the SCC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:openshift:scc:sbr-operator-sbr-agent-privileged
  labels:
    app.kubernetes.io/name: sbr-operator
    app.kubernetes.io/component: sbr-agent
rules:
- apiGroups:
  - security.openshift.io
  resourceNames:
  - sbr-operator-sbr-agent-privileged
  resources:
  - securitycontextconstraints
  verbs:
  - use

---
# System ClusterRoleBinding for the SCC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: system:openshift:scc:sbr-operator-sbr-agent-privileged:sbr-agent
  labels:
    app.kubernetes.io/name: sbr-operator
    app.kubernetes.io/component: sbr-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:sbr-operator-sbr-agent-privileged
subjects:
- kind: ServiceAccount
  name: sbr-agent
  namespace: sbr-system 