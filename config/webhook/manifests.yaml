---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-storage-based-remediation-medik8s-io-v1alpha1-storagebasedremediationconfig
  failurePolicy: Fail
  name: vstoragebasedremediationconfig.kb.io
  rules:
  - apiGroups:
    - storage-based-remediation.medik8s.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - storagebasedremediationconfigs
  sideEffects: None
