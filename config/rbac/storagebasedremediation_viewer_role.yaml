# This rule is not used by the project sbr-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to storage-based-remediation.medik8s.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: sbr-operator
    app.kubernetes.io/managed-by: kustomize
  name: storagebasedremediation-viewer-role
rules:
- apiGroups:
  - storage-based-remediation.medik8s.io
  resources:
  - storagebasedremediations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - storage-based-remediation.medik8s.io
  resources:
  - storagebasedremediations/status
  verbs:
  - get
