# This rule is not used by the project sbr-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the storage-based-remediation.medik8s.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: sbr-operator
    app.kubernetes.io/managed-by: kustomize
  name: storagebasedremediationtemplate-editor-role
rules:
- apiGroups:
  - storage-based-remediation.medik8s.io
  resources:
  - storagebasedremediationtemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - storage-based-remediation.medik8s.io
  resources:
  - storagebasedremediationtemplates/status
  verbs:
  - get
