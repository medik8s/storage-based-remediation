# This rule is not used by the project sbr-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over storage-based-remediation.medik8s.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: sbr-operator
    app.kubernetes.io/managed-by: kustomize
  name: storagebasedremediationtemplate-admin-role
rules:
- apiGroups:
  - storage-based-remediation.medik8s.io
  resources:
  - storagebasedremediationtemplates
  verbs:
  - '*'
- apiGroups:
  - storage-based-remediation.medik8s.io
  resources:
  - storagebasedremediationtemplates/status
  verbs:
  - get
