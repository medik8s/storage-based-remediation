# Example StorageBasedRemediationConfig using OpenShift Data Foundation CephFS storage
# This example demonstrates how to configure SBR with CephFS storage
# provisioned by OpenShift Data Foundation for high-availability clustering
apiVersion: storage-based-remediation.medik8s.io/v1alpha1
kind: StorageBasedRemediationConfig
metadata:
  name: sbr-with-odf-cephfs
  namespace: sbr-system
  labels:
    app.kubernetes.io/name: sbr-operator
    app.kubernetes.io/instance: sbr-with-odf
    storage.medik8s.io/type: cephfs
  annotations:
    description: "SBR configuration using OpenShift Data Foundation CephFS for shared storage coordination"
spec:
  # Watchdog configuration
  watchdogPath: "/dev/watchdog"
  watchdogTimeout: "60s"

  # Node management settings
  
  # ✅ OPENSHIFT DATA FOUNDATION CEPHFS STORAGE CONFIGURATION ✅
  # This StorageClass should be created by the setup-odf-storage tool
  # It provides ReadWriteMany (RWX) access mode with POSIX file locking
  sharedStorageClass: "sbr-cephfs"
  
  # Node selector to target specific nodes (optional)
  # Default targets worker nodes only
  nodeSelector:
    node-role.kubernetes.io/worker: ""
    # kubernetes.io/arch: "amd64"  # Uncomment to target specific architecture
  
  # Tolerations for scheduling (optional)
  # tolerations:
  #   - key: "node-role.kubernetes.io/master"
  #     operator: "Exists"
  #     effect: "NoSchedule"

---
# Example: Alternative configuration with aggressive cache coherency
# Use this when strict SBR coordination is required
apiVersion: storage-based-remediation.medik8s.io/v1alpha1
kind: StorageBasedRemediationConfig
metadata:
  name: sbr-with-odf-strict
  namespace: sbr-system
  labels:
    app.kubernetes.io/name: sbr-operator
    app.kubernetes.io/instance: sbr-with-odf-strict
    storage.medik8s.io/type: cephfs
    storage.medik8s.io/mode: strict-coherency
  annotations:
    description: "SBR configuration with strict cache coherency for mission-critical environments"
spec:
  # Watchdog configuration with shorter timeout for faster response
  watchdogPath: "/dev/watchdog"
  watchdogTimeout: "30s"
  petIntervalMultiple: 3
  
  # Faster stale node detection
  
  # StorageClass created with --aggressive-coherency flag
  # This should be created by: ./setup-odf-storage --aggressive-coherency --storage-class-name=sbr-cephfs-strict
  sharedStorageClass: "sbr-cephfs-strict"
  
  # Target all worker nodes
  nodeSelector:
    node-role.kubernetes.io/worker: ""

---
# Example: Multi-tenant SBR configuration
# Demonstrates multiple SBR configurations in the same namespace
apiVersion: storage-based-remediation.medik8s.io/v1alpha1
kind: StorageBasedRemediationConfig
metadata:
  name: sbr-tenant-a
  namespace: sbr-system
  labels:
    app.kubernetes.io/name: sbr-operator
    app.kubernetes.io/instance: sbr-tenant-a
    tenant: "tenant-a"
    storage.medik8s.io/type: cephfs
spec:
  image: "quay.io/medik8s/storage-based-remediation-agent:latest"
  watchdogPath: "/dev/watchdog"
  watchdogTimeout: "60s"
  sharedStorageClass: "sbr-cephfs"
  
  # Target specific nodes for tenant A
  nodeSelector:
    node-role.kubernetes.io/worker: ""
    tenant: "tenant-a"

---
# Example: Development/Testing configuration
# Smaller timeouts and simpler configuration for testing
apiVersion: storage-based-remediation.medik8s.io/v1alpha1
kind: StorageBasedRemediationConfig
metadata:
  name: sbr-dev-test
  namespace: sbr-system
  labels:
    app.kubernetes.io/name: sbr-operator
    app.kubernetes.io/instance: sbr-dev-test
    environment: development
    storage.medik8s.io/type: cephfs
  annotations:
    description: "Development SBR configuration for testing and validation"
spec:
  image: "quay.io/medik8s/storage-based-remediation-agent:latest"
  
  # Shorter timeouts for faster testing cycles
  watchdogPath: "/dev/watchdog"
  watchdogTimeout: "30s"
  petIntervalMultiple: 2
  
  sharedStorageClass: "sbr-cephfs"
  
  # Target development nodes only
  nodeSelector:
    node-role.kubernetes.io/worker: ""
    environment: "development" 
